<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="form.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Profile Form</h1>
    <form action="/profile" method="POST">
      <label for="name"><i class="fa-solid fa-user"></i> Name</label>
      <input
        id="name"
        type="text"
        name="name"
        placeholder="Enter your name"
        minlength="3"
        maxlength="50"
        required
      />
      <label for="my-age"><i class="fa-solid fa-cake"></i>Age</label>
      <input
        type="number"
        name="age"
        id="my-age"
        placeholder="Enter age"
        min="1"
        max="100"
      />
      <label for="email"
        ><i class="fa-solid fa-envelope"></i>Email Address</label
      >
      <input type="email" name="email" id="email" required />
      <label for="phone"><i class="fa-solid fa-phone"></i>Phone number</label>
      <input type="tel" name="phone" id="phone" value="+9779876540" disabled />
      <!-- Checkbox: Multi-select -->
      <label><i class="fa-solid fa-running"></i>Hobbies</label>
      <div class="hobbies">
        <input type="checkbox" name="hobbies" checked /> Swimming
        <input type="checkbox" name="hobbies" checked /> Driving
        <input type="checkbox" name="hobbies" /> Traveling
        <input type="checkbox" name="hobbies" /> Movies
        <input type="checkbox" name="hobbies" /> Music
      </div>

      <!-- Radio: Single select -->
      <label for=""><i class="fa-solid fa-mars-and-venus"></i>Gender</label>
      <div class="gender">
        <input type="radio" name="gender" checked />Male
        <input type="radio" name="gender" />Female
        <input type="radio" name="gender" />Other
      </div>

      <label for="docs"><i class="fa-solid fa-file"></i>File</label>
      <input
        type="file"
        name="docs"
        id="docs"
        accept=".jpg,.png,.pdf"
        multiple
      />

      <label for="meeting"
        ><i class="fa-solid fa-calendar"></i>Meeting date</label
      >
      <input type="date" name="" id="meeting" />
      <input type="time" name="" id="meeting" />
      <input type="datetime-local" name="" id="meeting" />

      <!-- <label for="ratings"><i class="fa-solid fa-star"></i>Ratings</label>
      <input
        type="range"
        name="ratings"
        id="ratings"
        min="1"
        max="10"
        step="0.5"
      />

      <label for="color">Color</label>
      <input type="color" name="" id="color" /> -->

      <label for="password"><i class="fa-solid fa-lock"></i>Password</label>
      <div class="password">
        <input type="password" name="" id="password" />
        <i class="fa-solid fa-eye"></i>
      </div>

      <label for="search"
        ><i class="fa-solid fa-magnifying-glass"></i>Search</label
      >
      <input type="search" name="" id="search" list="animals" />
      <datalist id="animals">
        <option value="Cat">Cat</option>
        <option value="Dog">Dog</option>
        <option value="Cow">Cow</option>
        <option value="Rabbit">Rabbit</option>
        <option value="Goat">Goat</option>
        <option value="Sheep">Sheep</option>
      </datalist>

      <label for="class"><i class="fa-solid fa-book-open"></i>Class</label>
      <select name="class" id="class">
        <option value="" disabled selected>Select your class</option>
        <optgroup label="primary classes">
          <option value="class1">Class 1</option>
          <option value="class2">Class 2</option>
          <option value="class3">Class 3</option>
          <option value="class4">Class 4</option>
          <option value="class5">Class 5</option>
        </optgroup>
        <optgroup label="secondary classes">
          <option value="class6">Class 6</option>
          <option value="class7">Class 7</option>
          <option value="class8">Class 8</option>
          <option value="class9">Class 9</option>
          <option value="class10">Class 10</option>
        </optgroup>
      </select>

      <label for="message"><i class="fa-solid fa-message"></i>Message</label>
      <textarea name="message" id="message" rows="10" cols="50"></textarea>
      <!-- <input type="submit" value="Save Profile" /> -->

      <button type="submit" title="Save">
        <i class="fa-solid fa-save"></i>Save Profile
      </button>

      <!-- <input type="image" src="speaker.png" height="40" /> -->
    </form>
  </body>
</html>
