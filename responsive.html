<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      h1 {
        font-size: 4rem;
      }

      .box {
        border: 1px solid;
        height: 200px;
        width: 100%;
        background-color: aquamarine;
      }

      .container {
        display: grid;
        justify-items: center;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      /* Tablet screen  */
      @media (min-width: 481px) and (max-width: 768px) {
        h1 {
          font-size: 6rem;
        }

        .container {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* Large tablet screen */
      @media (min-width: 769px) and (max-width: 1200px) {
        h1 {
          font-size: 8rem;
        }

        .container {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }

      /* Laptop and large size screen */
      @media (min-width: 1201px) {
        h1 {
          font-size: 10rem;
        }

        .container {
          grid-template-columns: 1fr 1fr 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Hello world</h1>

    <div class="container">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
